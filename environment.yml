# Conda environment for the reliability-gated consolidation package.
# Mirrors requirements.txt. Torch/torchvision are installed via pip from the
# PyTorch CUDA index (conda's defaults may not carry the exact cu130 build).
#   conda env create -f environment.yml && conda activate pnn-cl
name: pnn-cl
channels:
  - conda-forge
dependencies:
  - python=3.13
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu130
      - torch==2.12.0
      - torchvision==0.27.0
      - numpy==2.4.6
      - scipy==1.17.1
      - scikit-learn==1.9.0
      - pandas==3.0.3
      - matplotlib==3.11.0
      - seaborn==0.13.2
      - pyyaml==6.0.3
      - pytest==9.0.3
